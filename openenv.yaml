spec_version: 1
name: code-review-env
description: "An RL environment where an LLM agent reviews code, identifies bugs, assigns severity, and suggests fixes."
type: space
runtime: fastapi
app: app:app
port: 7860

tasks:
  - id: easy_offbyone
    name: "Sliding Window Off-by-One"
    description: "Single function with an off-by-one error in a sliding window algorithm. Agent must identify the bug, assign severity, and suggest a fix."
    difficulty: easy
    grader: "graders:openenv_grader_easy"

  - id: medium_auth
    name: "Authentication Module Review"
    description: "Multi-function authentication module with SQL injection, weak password hashing, and missing permission checks."
    difficulty: medium
    grader: "graders:openenv_grader_medium"

  - id: hard_pr_review
    name: "Payment Gateway PR Review"
    description: "Full pull request review of a payment processing endpoint with auth bypass, credential exposure, IDOR, and missing validation."
    difficulty: hard
    grader: "graders:openenv_grader_hard"
